# ==============================================================================
# Nginx Site Configuration for NEF Cadência
# ==============================================================================

# Upstream to Gunicorn
upstream gunicorn {
    server web:8000 fail_timeout=10s max_fails=3;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# ==============================================================================
# HTTP Server (Redirect to HTTPS in production)
# ==============================================================================
server {
    listen 80;
    server_name _;  # Replace with your domain: example.com www.example.com
    
    # Allow health checks
    location /health/ {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # Redirect all other traffic to HTTPS (uncomment in production)
    # return 301 https://$server_name$request_uri;
    
    # For development/testing without HTTPS, proxy all requests
    location / {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
}


{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}NEF Cadencia{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
  </head>
  <body>
    <div class="min-h-screen flex items-center justify-center px-4 py-10">
      <div class="w-full max-w-md">
        <div class="mb-6">
          <div class="text-sm text-slate-500">NEF Cadencia</div>
          <h1 class="text-2xl font-semibold text-slate-900">{% block card_title %}Titulo{% endblock %}</h1>
          <p class="text-sm text-slate-600 mt-1">{% block card_subtitle %}Subtitulo{% endblock %}</p>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
          {% block content %}{% endblock %}
        </div>

        <div class="mt-6 text-xs text-slate-500 flex justify-between">
          <span>Ambiente local</span>
          <a class="underline" href="{% url 'dashboard' %}">Ir para dashboard</a>
        </div>
      </div>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>

# ==============================================================================
# Nginx Site Configuration for NEF Cadência
# ==============================================================================
# Installation:
#   sudo cp deployment/nginx-site.conf /etc/nginx/sites-available/nef-cadencia
#   sudo ln -s /etc/nginx/sites-available/nef-cadencia /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
# ==============================================================================

# Upstream to Gunicorn
upstream nef_cadencia {
    server unix:/opt/nef-cadencia/run/gunicorn.sock fail_timeout=10s max_fails=3;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=admin:10m rate=5r/s;

# ==============================================================================
# HTTP Server (Redirect to HTTPS)
# ==============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;  # CHANGE THIS
    
    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Allow health checks
    location /health/ {
        proxy_pass http://nef_cadencia;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ==============================================================================
# HTTPS Server (Production)
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;  # CHANGE THIS
    
    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;  # CHANGE THIS
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;  # CHANGE THIS
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;  # CHANGE THIS
    
    # SSL Security (Mozilla Intermediate Configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL Session
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Logging
    access_log /var/log/nginx/nef-cadencia-access.log;
    error_log /var/log/nginx/nef-cadencia-error.log warn;
    
    # Client settings
    client_max_body_size 20M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Root directory
    root /opt/nef-cadencia;
    
    # Health check (no rate limit)
    location /health/ {
        proxy_pass http://nef_cadencia;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }
    
    # Static files
    location /static/ {
        alias /opt/nef-cadencia/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Enable gzip for static files
        gzip_static on;
        
        # Security headers for static files
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Media files
    location /media/ {
        alias /opt/nef-cadencia/media/;
        expires 7d;
        add_header Cache-Control "public";
        
        # Security: Prevent execution of uploaded files
        location ~* \.(php|py|pl|sh|cgi|exe|bat)$ {
            deny all;
        }
    }
    
    # Admin panel (rate limited and optionally IP restricted)
    location /admin/ {
        limit_req zone=admin burst=5 nodelay;
        
        proxy_pass http://nef_cadencia;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Optional: Restrict admin access by IP
        # allow 192.168.1.0/24;
        # allow 10.0.0.0/8;
        # deny all;
    }
    
    # API endpoints (higher rate limit)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://nef_cadencia;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # All other requests
    location / {
        limit_req zone=general burst=10 nodelay;
        
        proxy_pass http://nef_cadencia;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Favicon and robots.txt
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
}
